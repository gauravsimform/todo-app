<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #333;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }

    .input-row input:focus {
      border-color: #764ba2;
    }

    .input-row button {
      padding: 10px 20px;
      background: #764ba2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .input-row button:hover {
      background: #5e3a82;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    li:last-child {
      border-bottom: none;
    }

    li span {
      color: #333;
      word-break: break-word;
    }

    li button {
      background: none;
      border: none;
      color: #e55;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    li button:hover {
      background: #fee;
    }

    .empty {
      color: #999;
      text-align: center;
      padding: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Add a new todo..." />
      <button id="addBtn">Add</button>
    </div>
    <ul id="todoList">
      <li class="empty">No todos yet</li>
    </ul>
  </div>

  <script>
    const input = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('todoList');
    const todos = [];

    function render() {
      list.innerHTML = '';
      if (todos.length === 0) {
        list.innerHTML = '<li class="empty">No todos yet</li>';
        return;
      }
      todos.forEach((text, i) => {
        const li = document.createElement('li');
        const span = document.createElement('span');
        span.textContent = text;
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.title = 'Delete';
        btn.addEventListener('click', () => {
          todos.splice(i, 1);
          render();
        });
        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push(text);
      input.value = '';
      render();
      input.focus();
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo();
    });
  </script>
</body>
</html>
